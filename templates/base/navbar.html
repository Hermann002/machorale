{% load static %}

<div id="sidebar-container">
  <div id="sidebar-backdrop" class="fixed inset-0 z-30 bg-black/40 md:hidden {% if not sidebar_open %}hidden{% endif %} h-full"></div>
  <aside id="admin-sidebar" class="fixed inset-y-0 left-0 z-40 w-64 transform transition-transform duration-300 shadow-xl md:static md:translate-x-0 md:shadow-none md:flex md:w-64 flex-shrink-0 flex flex-col bg-white dark:bg-gray-900 border-r border-[#e7ebf3] dark:border-gray-800 {% if sidebar_open %}translate-x-0{% else %}-translate-x-full{% endif %} h-full">
    <div class="p-6 flex flex-col h-full justify-between">
      <div>
        <div class="flex items-center justify-between gap-3 mb-10">
        <div class="flex items-center gap-3">
          <div class="p-2 rounded-lg">
            <a href="{% url 'home'%}">
              <img src="{% static 'images/logo.png' %}" alt="Logo" class="h-8 w-auto">
            </a>
          </div>
          <p class="text-xs text-[#4c669a] mt-1">Admin Portal</p>
        </div>
        <button hx-get="{% url 'sidebar_toggle' slug=slug %}?open=0" hx-target="#sidebar-container" hx-swap="outerHTML" class="md:hidden p-2 rounded-lg text-[#4c669a] hover:bg-[#f8f9fc] dark:hover:bg-gray-800">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <nav class="flex flex-col gap-2">
        <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg

        {% if request.resolver_match.url_name == 'dashboard' %}
          bg-primary text-white
        {% else %}
          text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800
        {% endif %}
        
        transition-all" hx-boost="true" href="{% url 'dashboard' slug=slug %}">
          <span class="material-symbols-outlined text-xl">dashboard</span>
          <span class="text-sm font-medium">Dashboard</span>
        </a>
        <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 opacity-50 cursor-not-allowed pointer-events-none transition-all"
        disabled>
          <span class="material-symbols-outlined text-xl">money</span>
          <span class="text-sm font-medium">Contributions</span>
        </button>
        <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg

        {% if request.resolver_match.url_name == 'members' %}
          bg-primary text-white
        {% else %}
          text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800
        {% endif %}
        
        transition-all" hx-get="{% url 'members' slug=slug %}" hx-trigger="click" hx-target="body" hx-swap="innerHTML" hx-push-url="true">
          <span class="material-symbols-outlined text-xl">group</span>
          <span class="text-sm font-medium">Members</span>
        </button>
        <a href="{% url 'events' slug=slug %}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg

        {% if request.resolver_match.url_name == 'events' %}
          bg-primary text-white
        {% else %}
          text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800
        {% endif %}
        
        transition-all" hx-get="{% url 'events' slug=slug %}" hx-trigger="click" hx-target="body" hx-swap="innerHTML" hx-push-url="true">
          <span class="material-symbols-outlined text-xl">event</span>
          <span class="text-sm font-medium">Calendrier</span>
        </a>
        <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 opacity-50 cursor-not-allowed pointer-events-none transition-all"
        disabled>
          <span class="material-symbols-outlined text-xl">description</span>
          <span class="text-sm font-medium">Sanctions</span>
        </button>
        <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 opacity-50 cursor-not-allowed pointer-events-none transition-all"
        disabled>
          <span class="material-symbols-outlined text-xl">account_balance_wallet</span>
          <span class="text-sm font-medium">Finances</span>
        </button>
        <a href="{% url 'events_list' slug=slug %}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg
        {% if request.resolver_match.url_name == 'events_list' %}
          bg-primary text-white
        {% else %}
          text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800
        {% endif %}
        transition-all" hx-get="{% url 'events_list' slug=slug %}" hx-trigger="click" hx-target="body" hx-swap="innerHTML" hx-push-url="true">
          <span class="material-symbols-outlined text-xl">event_list</span>
          <span class="text-sm font-medium">Evénements</span>
        </a>
        <button class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 opacity-50 cursor-not-allowed pointer-events-none transition-all"
        disabled>
          <span class="material-symbols-outlined text-xl">source_notes</span>
          <span class="text-sm font-medium">Activités</span>
        </button>
      </nav>
    </div>
    <div class="mt-auto pt-6 border-t border-[#e7ebf3] dark:border-gray-800">
      <button
        hx-get="{% url 'member_popup' slug=slug %}"
        hx-target="body"
        hx-swap="beforeend"
        hx-trigger="click"
        class="w-full flex items-center justify-center gap-2 bg-primary text-white py-2.5 rounded-xl text-sm font-semibold shadow-sm hover:bg-primary/90 hover:shadow-md hover:shadow-primary/20 active:scale-95 active:opacity-90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/40 transition-all duration-150">
        <span class="material-symbols-outlined text-base">person_add</span>
        Ajouter un membre
      </button>
      <a href="{% url 'logout' %}"
         class="mt-3 w-full flex items-center justify-center gap-2 border border-[#e7ebf3] dark:border-gray-700 text-[#4c669a] dark:text-slate-400 py-2.5 rounded-xl text-sm font-semibold hover:bg-[#e7ebf3] dark:hover:bg-gray-800 active:scale-95 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/40 transition-all duration-150">
        <span class="material-symbols-outlined text-base">logout</span>
        Déconnexion
      </a>
    </div>
  </div>
</aside>
</div>
