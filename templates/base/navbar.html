{% load static %}

<aside class="w-64 flex-shrink-0 flex flex-col bg-white dark:bg-gray-900 border-r border-[#e7ebf3] dark:border-gray-800">

          </a>
        </div>
        <p class="text-xs text-[#4c669a] mt-1">Admin Portal</p>
      </div>
      <nav class="flex flex-col gap-2">

          <span class="text-sm font-medium">Dashboard</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 transition-all" href="#">

        <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 transition-all" href="#">

        <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 transition-all" href="#">
          <span class="material-symbols-outlined text-xl">event</span>
          <span class="text-sm font-medium">Calendier</span>

        <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 transition-all" href="#">
          <span class="material-symbols-outlined text-xl">description</span>
          <span class="text-sm font-medium">Sanctions</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-[#4c669a] hover:bg-[#e7ebf3] dark:hover:bg-gray-800 transition-all" href="#">

        <span class="material-symbols-outlined text-sm">person_add</span>
        Add Member
      </button>
      <button class="w-full flex items-center justify-center gap-2 bg-primary text-white py-2.5 rounded-lg font-bold text-sm shadow-md hover:bg-blue-700 transition-colors mt-3">
        <a href="{% url 'logout' %}" class="btn btn-outline-primary me-2">logout</a>
