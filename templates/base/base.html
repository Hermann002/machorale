<!DOCTYPE html>
<html lang="en">
    {% include "base/head.html" %}
<body class="bg-background-light dark:bg-background-dark font-display text-[#0d121b] dark:text-gray-100">
    <!-- Barre de progression HTMX globale — affichée via JS sur htmx:beforeRequest -->
    <div id="htmx-progress"
         class="fixed top-0 left-0 w-full z-[9999] pointer-events-none opacity-0 transition-opacity duration-200">
        <div class="h-0.5 bg-primary"></div>
    </div>
    <div class="flex h-screen overflow-hidden">
        {% include "base/navbar.html" %}
        <main class="flex-1 flex flex-col overflow-y-auto">
            {% include "base/header.html" %}
            <main id="main-content">
                {% block content %}{% endblock %}
            </main>
        </main>
        {% include "base/footer.html" %}
        {% include "base/scripts.html" %}
    </div>
</body>
</html>
