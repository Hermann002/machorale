{% load i18n %}
<form method="post" action="{{ action_url }}"
      hx-post="{{ action_url }}" hx-target="#modal" hx-swap="innerHTML"
      class="space-y-4">
    {% csrf_token %}
    {% if form.non_field_errors %}
    <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-xl text-sm">{{ form.non_field_errors }}</div>
    {% endif %}
    <div>
        <label class="block text-sm font-medium mb-2">{% translate "Titre" %}</label>
        {{ form.title }} {{ form.title.errors }}
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium mb-2">{% translate "Montant par membre (XAF)" %}</label>
            {{ form.amount }} {{ form.amount.errors }}
        </div>
        <div>
            <label class="block text-sm font-medium mb-2">{% translate "Objectif total (optionnel)" %}</label>
            {{ form.target_amount }} {{ form.target_amount.errors }}
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium mb-2">{% translate "Description" %}</label>
        {{ form.description }} {{ form.description.errors }}
    </div>
    <label class="inline-flex items-center gap-2">
        {{ form.is_active }}
        <span class="text-sm">{% translate "Cotisation active" %}</span>
    </label>
    <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-800">
        <button type="button" onclick="document.getElementById('modal').innerHTML='';"
                class="text-sm font-semibold text-slate-500 hover:text-slate-700 px-4 py-2">{% translate "Annuler" %}</button>
        <button type="submit"
                class="inline-flex items-center gap-2 text-sm font-semibold text-white bg-primary px-5 py-2.5 rounded-xl hover:bg-primary/90 active:scale-95 transition-all">
            <span class="material-symbols-outlined text-base">save</span>
            {% translate "Créer" %}
        </button>
    </div>
</form>
